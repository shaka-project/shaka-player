name: Bug report
description: Report a bug to help us improve
labels: ["type: bug"]
body:
  - type: checkboxes
    id: faq
    attributes:
      label: FAQ
      options:
        - label: I have read the [FAQ](https://bit.ly/ShakaFAQ) and checked for duplicate open issues
          required: true

  - type: dropdown
    id: fairplay_tutorial
    attributes:
      label: If the problem is related to FairPlay, have you read the tutorial?
      description: "Tutorial: https://shaka-project.github.io/shaka-player/docs/api/tutorial-fairplay.html"
      options:
        - "Yes"
        - "No"
        - "Not applicable"
      default: 2
    validations:
      required: true

  - type: input
    id: shaka_version
    attributes:
      label: What version of Shaka Player are you using?
      description: "Only some versions of the application are [maintained](https://github.com/shaka-project/shaka-player/blob/main/maintained-branches.md), if your version
          is older, first update to a newer one."
    validations:
      required: true

  - type: dropdown
    id: reproduce_release
    attributes:
      label: Can you reproduce the issue with our latest release version?
      options:
        - "Yes"
        - "No"
        - "Not tested"
    validations:
      required: true

  - type: dropdown
    id: reproduce_main
    attributes:
      label: Can you reproduce the issue with the latest code from `main`?
      options:
        - "Yes"
        - "No"
        - "Not tested"
    validations:
      required: true

  - type: dropdown
    id: app_type
    attributes:
      label: Are you using the demo app or your own custom app?
      options:
        - "Shaka Player demo app"
        - "Custom app"
        - "Both"
    validations:
      required: true

  - type: input
    id: browser_os
    attributes:
      label: What browser and OS are you using?
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: For embedded devices (smart TVs, etc.), what model and firmware version are you using?
    validations:
      required: false

  - type: textarea
    id: manifest
    attributes:
      label: What are the manifest and license server URIs?
      placeholder: You can send the URIs to <shaka-player-maintainers@googlegroups.com> instead, but please use GitHub and the template for the rest. A copy of the manifest text or an attached manifest will **not** be enough to reproduce your issue, and we **will** ask you to send a URI instead.  You can copy the URI of the demo app to send us the exact asset, licence server, and settings you have selected there. Avoid geo-blocked content if at all possible, as the contributors who diagnose Shaka Player issues may not be able to access it. If you send the URIs to email, the response time and resolution will be much higher.
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: What configuration are you using? What is the output of `player.getNonDefaultConfiguration()`?
      placeholder: You can censor URLs to keep them private, but include them in the email. You can also use JSON.stringify(player.getNonDefaultConfiguration(), null, 2) to print nicely on platforms that don't print objects well in the console. DON'T SEND '[object Object]'!
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: What did you do?
      placeholder:  Steps to reproduce the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      placeholder: A clear and concise description of what the bug is. If applicable, you may add screenshots to help explain your problem.
    validations:
      required: true

  - type: dropdown
    id: pr
    attributes:
      label: Are you planning to send a PR to add it?
      options:
        - "Yes"
        - "No"
    validations:
      required: true
