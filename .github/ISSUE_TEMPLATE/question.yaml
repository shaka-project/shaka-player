name: Question
description: An open-ended question or discussion about Shaka Player, but not a bug report or feature request
title: ""
labels: ["type: question"]
assignees: []

body:
  - type: checkboxes
    id: faq
    attributes:
      label: FAQ
      options:
        - label: I have read the [FAQ](https://bit.ly/ShakaFAQ) and checked for duplicate open issues
          required: true

  - type: dropdown
    id: fairplay_tutorial
    attributes:
      label: If the question is related to FairPlay, have you read the tutorial?
      description: https://shaka-project.github.io/shaka-player/docs/api/tutorial-fairplay.html
      options:
        - Yes
        - No
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: shaka_version
    attributes:
      label: What version of Shaka Player are you using?

  - type: textarea
    id: browser_os
    attributes:
      label: What browser and OS are you using?

  - type: textarea
    id: question
    attributes:
      label: Please ask your question
    validations:
      required: true